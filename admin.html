<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Admin | MAV Connect</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <main class="admin-shell">
    <section class="login-card" id="loginView">
      <div class="brand-logo">MAV</div>
      <h1>MAV Connect</h1>
      <p>Painel de administração.</p>
      <form id="loginForm" class="stack">
        <label>Email<input id="loginEmail" type="email" required autocomplete="email" /></label>
        <label>Password<input id="loginPassword" type="password" required autocomplete="current-password" /></label>
        <button type="submit">Entrar</button>
        <p class="status" id="loginStatus"></p>
      </form>
    </section>

    <section class="admin-view hidden" id="adminView">
      <header class="admin-topbar">
        <div class="brand-row">
          <div class="brand-logo small">MAV</div>
          <div>
            <h1>Admin</h1>
            <p id="userEmail">Sessão ativa</p>
          </div>
        </div>
        <button class="ghost" id="logoutBtn" type="button">Sair</button>
      </header>

      <section class="stats-grid">
        <article><span>Total notícias</span><strong id="statNoticias">0</strong></article>
        <article><span>Destaques ativos</span><strong id="statDestaques">0</strong></article>
        <article><span>Visualizações</span><strong id="statViews">0</strong></article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2 id="formTitle">Nova notícia</h2>
            <p>Publica diretamente na base de dados do Supabase.</p>
          </div>
          <button class="ghost" id="resetFormBtn" type="button">Limpar</button>
        </div>

        <form id="newsForm" class="form-grid">
          <input type="hidden" id="newsId" />
          <label>Título<input id="titulo" type="text" required maxlength="140" /></label>
          <label>Resumo<textarea id="resumo" rows="3" required></textarea></label>
          <label class="full">Conteúdo<textarea id="conteudo" rows="8" required></textarea></label>
          <label>Categoria
            <select id="categoria" required>
              <option value="Marketing">Marketing</option>
              <option value="Audiovisuais">Audiovisuais</option>
              <option value="Videojogos">Videojogos</option>
            </select>
          </label>
          <label>Autor<input id="autor" type="text" placeholder="Equipa MAV" /></label>
          <label>Imagem de capa<input id="imagem" type="file" accept="image/*" /></label>
          <label>PDF/anexo opcional<input id="anexo" type="file" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,image/*" /></label>
          <div class="checks full">
            <label><input id="destaque" type="checkbox" /> Marcar como destaque</label>
            <label><input id="publicado" type="checkbox" checked /> Publicado</label>
          </div>
          <button class="full" type="submit" id="submitBtn">Publicar</button>
          <p class="status full" id="formStatus"></p>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>Notícias</h2>
            <p>Editar, arquivar ou eliminar publicações.</p>
          </div>
          <button class="ghost" id="refreshBtn" type="button">Atualizar</button>
        </div>
        <div class="news-list" id="adminNewsList"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
