<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Marketing Update</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <main>
      <section class="section-block feed-section">
        <div class="feed" id="newsFeed"></div>
      </section>

      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">⌁</div>
        <h3>Sem conteúdos</h3>
        <p>Ainda não existem conteúdos disponíveis.</p>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navegação principal">
    <button class="nav-item active" type="button" data-view="home">
      <span>⌂</span>
      <small>Home</small>
    </button>
    <button class="nav-item" type="button" data-view="search">
      <span>⌕</span>
      <small>Pesquisa</small>
    </button>
  </nav>

  <div class="search-modal hidden" id="searchModal" aria-hidden="true">
    <div class="search-sheet" role="dialog" aria-modal="true" aria-label="Pesquisar conteúdos">
      <div class="search-head">
        <h2>Pesquisa</h2>
        <button class="modal-close small-close" id="closeSearch" type="button" aria-label="Fechar pesquisa">×</button>
      </div>
      <label class="search-box search-box-modal">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="Pesquisar por título ou conteúdo..." autocomplete="off" />
      </label>
      <p class="search-hint">Os resultados aparecem diretamente no feed.</p>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="newsModal" aria-hidden="true">
    <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="closeModal" type="button" aria-label="Fechar conteúdo">×</button>
      <div class="modal-image-wrap">
        <img id="modalImage" src="" alt="" />
      </div>
      <div class="modal-content">
        <div class="modal-meta">
          <span id="modalDate"></span>
        </div>
        <h2 id="modalTitle"></h2>
        <div id="modalBody" class="modal-body"></div>
        <div class="reaction-area">
          <button id="fireBtn" class="fire-btn" type="button">🔥</button>
          <p id="fireText"></p>
        </div>
        <div id="modalAttachments" class="attachments"></div>
      </div>
    </article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
